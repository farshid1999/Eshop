{% extends 'shared/base.html' %}

{% block title %}
ورود به حساب کاربری
{% endblock %}


{% block content %}
<div class="container">
		<section id="form"><!--form-->
			<div class="row">
				<div class="col-sm-6 col-md-offset-3">
					<div class="signup-form"><!--login form-->
						<h2>ثبت نام کاربـر جدیـد</h2>
						<form method="post" action="{% url 'login_page' %}">
                            {% csrf_token %}
                            {{ login_form.user }}
                            {{ login_form.password }}
                            {{ login_form.user.errors }}
                            {{ login_form.password.errors }}
                            <a href="{%url 'forgot_pass_page'%}">فراموشی رمز عبور</a>
							<button type="submit" class="btn btn-default">ورود</button>
						</form>
					</div><!--/login up form-->
				</div>
			</div>
		</section>
	</div>
{% endblock %}
