{% extends 'shared/base.html' %}

{% block title %}
بازیابی رمز عبور
{% endblock %}


{% block content %}
<div class="container">
		<section id="form"><!--form-->
			<div class="row">
				<div class="col-sm-6 col-md-offset-3">
					<div class="signup-form"><!--login form-->
						<h2>رمز عبور خود را وارد کنید</h2>
						<form method="post" action="{% url 'login_page' active_code=user.email_active_code %}">
                            {% csrf_token %}
                            {{ reset_pass_form.password }}
                            {{ reset_pass_form.confirm_password }}
                            {{ reset_pass_form.errors}}
							<button type="submit" class="btn btn-default">فعال سازی رمز عبور</button>
						</form>
					</div><!--/login up form-->
				</div>
			</div>
		</section>
	</div>
{% endblock %}
